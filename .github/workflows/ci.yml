name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          mapfile -t files < <(
            find .mise/tasks mise/tag-default/.config/mise/tasks \
              -type f \
              \( -name "*.sh" -o ! -name "*.*" \) \
              -not -path "*/.git/*"
          )
          printf 'Linting %d files\n' "${#files[@]}"
          shellcheck --severity=warning "${files[@]}"

  format:
    name: shfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shfmt
        run: |
          curl -fsSL -o /tmp/shfmt \
            https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64
          chmod +x /tmp/shfmt
          sudo mv /tmp/shfmt /usr/local/bin/shfmt
      - name: Run shfmt (diff mode)
        run: |
          mapfile -t files < <(
            find .mise/tasks mise/tag-default/.config/mise/tasks \
              -type f \
              \( -name "*.sh" -o ! -name "*.*" \) \
              -not -path "*/.git/*"
          )
          shfmt -d -i 4 -ci -bn "${files[@]}"

  stow-dry-run:
    name: stow dry-run (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - bash
          - bat
          - claude
          - fzf
          - gh
          - gh-dash
          - ghostty
          - gnome_themes
          - gpg
          - mise
          - nvim
          - p10k
          - ruff
          - tmux
          - yazi
          - zsh
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install stow
        run: sudo apt-get update && sudo apt-get install -y stow
      - name: Dry-run stow ${{ matrix.package }}
        run: |
          # Fresh HOME so the dry-run is deterministic
          fake_home="$(mktemp -d)"
          mkdir -p "$fake_home/.config"
          stow -nv -d "${{ matrix.package }}" -t "$fake_home" tag-default

  stow-smoke:
    # Narrower than "bootstrap smoke" by design: full `mise run bootstrap`
    # touches graphical stacks (ghostty, gnome-extensions, cosmic), installs
    # system tools (veracrypt, nodes-tools), and runs interactive configurators
    # (p10k-configure) — none of which are reproducible in a headless container.
    # Instead we verify the one part of bootstrap CI *can* verify safely:
    # deploying every non-excluded stow package via setup:dotfiles. Run twice
    # to assert idempotency of the symlink graph, submodule pointers, and
    # backup file set.
    name: stow smoke (${{ matrix.image }})
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        image: [ubuntu:24.04, ubuntu:22.04]
    container:
      image: ${{ matrix.image }}
    env:
      DEBIAN_FRONTEND: noninteractive
      DOTFILES_NONINTERACTIVE: "1"
      DOTFILES_TAG: default
      HOME: /root
    steps:
      - name: Install base deps
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git sudo curl ca-certificates stow
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          path: repo
      - name: Place repo at ~/.dotfiles
        run: |
          set -euo pipefail
          ln -s "$GITHUB_WORKSPACE/repo" "$HOME/.dotfiles"
          printf 'default' > "$HOME/.dotfiles/.device-tag"
          # Block graphical/desktop packages that don't belong in a headless container
          cat > "$HOME/.dotfiles/.stow-exclude" <<EOF
          ghostty
          gnome_themes
          EOF
          printf 'server' > "$HOME/.dotfiles/.graphical-env"
      - name: Install mise
        run: |
          set -euo pipefail
          curl -fsSL https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Stow mise config
        # Equivalent to the stow-install-and-deploy-mise-config half of
        # `mise run init`, minus the full-bootstrap trigger that fires when
        # DOTFILES_NONINTERACTIVE=1. Stow is already installed above.
        run: |
          set -euo pipefail
          cd "$HOME/.dotfiles"
          mkdir -p "$HOME/.config"
          stow -d mise -t "$HOME" tag-default
      - name: First run — setup:dotfiles
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          cd "$HOME/.dotfiles"
          mise trust -y
          mise run setup:dotfiles
          mkdir -p /tmp/run1
          find "$HOME" -maxdepth 4 -type l -printf '%p -> %l\n' 2>/dev/null | sort > /tmp/run1/symlinks.txt
          git -C "$HOME/.dotfiles" submodule status > /tmp/run1/submodules.txt
          find "$HOME" -maxdepth 6 \( -name "*.bak" -o -name "*.bak.*" \) 2>/dev/null | sort > /tmp/run1/backups.txt
      - name: Second run (idempotency)
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          cd "$HOME/.dotfiles"
          mise run setup:dotfiles
          mkdir -p /tmp/run2
          find "$HOME" -maxdepth 4 -type l -printf '%p -> %l\n' 2>/dev/null | sort > /tmp/run2/symlinks.txt
          git -C "$HOME/.dotfiles" submodule status > /tmp/run2/submodules.txt
          find "$HOME" -maxdepth 6 \( -name "*.bak" -o -name "*.bak.*" \) 2>/dev/null | sort > /tmp/run2/backups.txt
      - name: Assert idempotency contract
        run: |
          set -euo pipefail
          fail=0
          diff -u /tmp/run1/symlinks.txt /tmp/run2/symlinks.txt \
            || { echo "::error::symlink graph changed between runs"; fail=1; }
          diff -u /tmp/run1/submodules.txt /tmp/run2/submodules.txt \
            || { echo "::error::submodule pointers moved between runs"; fail=1; }
          diff -u /tmp/run1/backups.txt /tmp/run2/backups.txt \
            || { echo "::error::second run created new *.bak files"; fail=1; }
          exit "$fail"

  bootstrap-smoke:
    # End-to-end smoke test of `mise run init` in non-interactive mode. Catches
    # regressions where a task in the bootstrap chain calls `read` without a
    # DOTFILES_NONINTERACTIVE guard (would hang or abort an automated install).
    # Heavier than stow-smoke — runs the full task graph, installs runtimes.
    # Compile-from-source tools (ffmpeg, imagemagick in yazi.toml) are excluded
    # via .mise-conf-exclude to keep the job under ~15 minutes.
    name: bootstrap smoke (${{ matrix.image }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        image: [ubuntu:24.04, ubuntu:22.04]
    container:
      image: ${{ matrix.image }}
      # init runs `sudo`; root container needs a real user. Provide one.
      options: --user root
    env:
      DEBIAN_FRONTEND: noninteractive
      DOTFILES_NONINTERACTIVE: "1"
      DOTFILES_TAG: default
    steps:
      - name: Install base prereqs
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git sudo curl ca-certificates locales tzdata
          locale-gen en_US.UTF-8
      - name: Create non-root user with passwordless sudo
        # Mirrors the production target: a regular user that escalates via sudo,
        # not root. Catches `$USER`/PAM/chsh edge cases.
        run: |
          useradd -m -s /bin/bash tester
          echo 'tester ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/tester
          chmod 0440 /etc/sudoers.d/tester
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          path: repo
      - name: Place repo at ~tester/.dotfiles
        run: |
          set -euo pipefail
          mkdir -p /home/tester
          cp -a "$GITHUB_WORKSPACE/repo" /home/tester/.dotfiles
          chown -R tester:tester /home/tester/.dotfiles
          # Headless overrides + skip the heaviest mise tools (ffmpeg, imagemagick
          # in yazi.toml compile from source for 10+ min each).
          printf 'default' > /home/tester/.dotfiles/.device-tag
          printf 'server'  > /home/tester/.dotfiles/.graphical-env
          printf 'none'    > /home/tester/.dotfiles/.desktop-env
          printf 'yazi.toml\n' > /home/tester/.dotfiles/.mise-conf-exclude
          chown tester:tester /home/tester/.dotfiles/.device-tag \
                              /home/tester/.dotfiles/.graphical-env \
                              /home/tester/.dotfiles/.desktop-env \
                              /home/tester/.dotfiles/.mise-conf-exclude
      - name: Install mise (as tester)
        run: |
          set -euo pipefail
          sudo -u tester -H bash -lc 'curl -fsSL https://mise.run | sh'
      - name: Run mise run init (non-interactive)
        # Asserts the full init→bootstrap chain completes without hangs or aborts.
        # Exits non-zero if any task in the chain fails — including the unguarded
        # `read` blocker class this job exists to catch.
        run: |
          set -euo pipefail
          sudo -u tester -H \
            -E env DOTFILES_NONINTERACTIVE=1 DOTFILES_TAG=default \
            bash -lc '
              export PATH="$HOME/.local/bin:$PATH"
              cd $HOME/.dotfiles
              mise trust --all
              mise run init
            ' </dev/null
      - name: Verify post-bootstrap state
        run: |
          set -euo pipefail
          sudo -u tester -H bash -lc '
            export PATH="$HOME/.local/bin:$PATH"
            fail=0
            for f in $HOME/.zshrc $HOME/.config/nvim/init.lua $HOME/.claude/settings.json; do
              [[ -L "$f" || -f "$f" ]] || { echo "::error::missing $f"; fail=1; }
            done
            command -v zsh   >/dev/null || { echo "::error::zsh not installed"; fail=1; }
            command -v stow  >/dev/null || { echo "::error::stow not installed"; fail=1; }
            mise ls --installed | grep -qE "^(rust|go|node)\b" \
              || { echo "::error::expected mise runtimes (rust/go/node) missing"; fail=1; }
            broken=$(find $HOME -maxdepth 5 -xtype l 2>/dev/null | wc -l)
            [[ "$broken" -eq 0 ]] || { echo "::error::$broken broken symlinks"; fail=1; }
            exit "$fail"
          '
